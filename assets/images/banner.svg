<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 200" width="900" height="200" role="img" aria-label="prokodo UI – Empowering Digital Innovation">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#07101f"/>
      <stop offset="50%"  stop-color="#0d1a32"/>
      <stop offset="100%" stop-color="#071628"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1E90FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E6FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00E6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#64A1FF"/>
      <stop offset="50%"  stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#00E6FF"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1E90FF" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#00E6FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="900" height="200" rx="14" fill="url(#bg)"/>
  <rect width="900" height="200" rx="14" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.8"/>

  <ellipse cx="150"  cy="90"  rx="270" ry="160" fill="url(#orb1)"/>
  <ellipse cx="770"  cy="130" rx="250" ry="160" fill="url(#orb2)"/>

  <rect width="900" height="200" rx="14" fill="url(#dots)"/>

  <!-- embedded logo asset -->
  <image href="data:image/webp;base64,"
    x="355" y="28" width="190" height="56"
    preserveAspectRatio="xMidYMid meet"/>

  <!-- UI badge -->
  <text x="547" y="68"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="32" font-weight="800" fill="url(#titleGrad)"
    text-anchor="start" letter-spacing="-0.5">UI</text>

  <!-- Divider -->
  <line x1="310" y1="92" x2="590" y2="92"
    stroke="url(#borderGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="450" y="118"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="15" font-weight="400" fill="#94a3b8"
    text-anchor="middle" letter-spacing="3.5">EMPOWERING DIGITAL INNOVATION</text>
</svg>
