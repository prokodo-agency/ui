name: 📚 Docs (build check)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-docs:
    name: Build Docs (check only)
    runs-on: ubuntu-latest
    # Deployment is handled by release.yml after a successful npm publish.
    # This job only verifies the docs build cleanly on every non-release push.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 💿 Setup pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🧰 Setup Node.js (v22)
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build library
        run: pnpm build

      - name: 📘 Build Storybook (static export)
        run: pnpm run storybook:build

      - name: 📝 Generate component overview
        run: cd docs && node scripts/generate-overview.mjs

      - name: 🛠 Build Docusaurus site
        run: cd docs && pnpm build
