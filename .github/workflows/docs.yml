name: 📚 Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  deploy-docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Skip on release commits — release.yml deploys docs as part of the full
    # release pipeline (with the freshly published npm version), so running
    # a second deploy here would race and potentially overwrite it.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 💿 Setup pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🧰 Setup Node.js (v22)
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build library
        run: pnpm build

      - name: 📘 Build Storybook (static export)
        run: pnpm run storybook:build

      - name: 📝 Generate component overview
        run: cd docs && node scripts/generate-overview.mjs

      - name: 🛠 Build Docusaurus site
        run: cd docs && pnpm build

      - name: 🧱 Assemble Pages site (docs root + storybook subpath)
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/storybook

          # Docs become the primary site at ui.prokodo.com
          cp -R docs/build/. site/

          # Storybook is served under /storybook
          cp -R storybook-static/. site/storybook/

          # Custom domain for GitHub Pages
          echo 'ui.prokodo.com' > site/CNAME

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: 🌐 Deploy to GitHub Pages (ui.prokodo.com)
        id: deployment
        uses: actions/deploy-pages@v4
