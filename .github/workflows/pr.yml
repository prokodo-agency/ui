name: PR Checks

on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 💿 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: � Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install Cypress binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: npx cypress install

      - name: 📝 Check docs overview is up to date
        run: |
          node docs/scripts/generate-overview.mjs
          # Format the generated files so the comparison is against the same
          # Prettier-formatted output that is committed to the repo.
          npx prettier --write \
            docs/docs/components/overview.mdx \
            "docs/i18n/de/docusaurus-plugin-content-docs/current/components/overview.mdx"
          # git diff only works for tracked files; git status --porcelain catches
          # both modified tracked files and newly untracked generated files.
          # Run from repo root so paths are unambiguous.
          DIRTY=$(git status --porcelain \
                    docs/docs/components/overview.mdx \
                    docs/i18n/de/docusaurus-plugin-content-docs/current/components/overview.mdx \
                  2>/dev/null)
          if [ -n "$DIRTY" ]; then
            echo "::error::overview.mdx is stale — run 'node docs/scripts/generate-overview.mjs && npx prettier --write docs/docs/components/overview.mdx' and commit the result"
            git status --short \
              docs/docs/components/overview.mdx \
              docs/i18n/de/docusaurus-plugin-content-docs/current/components/overview.mdx
            exit 1
          fi
          echo "✅ overview.mdx is up to date"

      - name: 🌍 Check translation drift (DE)
        run: cd docs && node scripts/check-translation-drift.mjs

      - name: 🧪 Typecheck, Lint & Test
        run: pnpm format && pnpm lint && pnpm typecheck && pnpm test:unit:ci

      - name: 🛠 Build library (fail fast if broken)
        run: pnpm run build

      - name: 🎨 Visual regression – Light theme (Chromatic)
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          ELECTRON_EXTRA_LAUNCH_ARGS=--remote-debugging-port=9222 \
            npx cypress run --component --headless --expose theme=light
          npx chromatic --cypress --project-token=$CHROMATIC_PROJECT_TOKEN --exit-zero-on-changes

      - name: 🎨 Visual regression – Dark theme (Chromatic)
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          ELECTRON_EXTRA_LAUNCH_ARGS=--remote-debugging-port=9222 \
            npx cypress run --component --headless --expose theme=dark
          npx chromatic --cypress --project-token=$CHROMATIC_PROJECT_TOKEN --exit-zero-on-changes
