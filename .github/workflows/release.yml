name: Release

# Triggered only by push to main that originated from bump.yml
# (commit message starts with "chore(release):").
# All other main pushes are silently ignored by every job below.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  # ─── 1 ─────────────────────────────────────────────────────────────────────
  # Test, build and publish the library to npmjs.com.
  # ────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish — npmjs.com
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: read
      id-token: write

    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 💿 Setup pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🧰 Setup Node.js (v22) & npm registry cache
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
          cache: pnpm

      - name: ⬆️ Upgrade npm to latest
        run: npm i -g npm@latest

      - name: 📦 Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install Cypress binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      - name: 🧪 Typecheck, Lint & Test
        run: pnpm run test:ci

      - name: 🛠 Build library (production)
        run: pnpm run build

      - name: 🔖 Read version from package.json
        id: ver
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}"    >> "$GITHUB_OUTPUT"

      - name: ✅ Assert semver format
        shell: bash
        run: |
          VER=${{ steps.ver.outputs.version }}
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ version is not semver (X.Y.Z): ${VER}" >&2; exit 1
          fi
          echo "✅ Version: ${VER}"

      - name: 🔍 Check whether version already exists on npm
        id: npm-check
        shell: bash
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=${{ steps.ver.outputs.version }}
          if npm view "${NAME}@${VER}" version \
               --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 Publish to npmjs.com (OIDC provenance, public access)
        if: steps.npm-check.outputs.exists != 'true'
        run: npm publish --access public

  # ─── 2 ─────────────────────────────────────────────────────────────────────
  # Create git tag and GitHub Release after npm publish succeeds.
  # ────────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏷 Create and push git tag
        shell: bash
        run: |
          TAG="${{ needs.publish-npm.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "ℹ️  Tag ${TAG} already exists — skipping"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: 📢 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish-npm.outputs.tag }}
          name: ${{ needs.publish-npm.outputs.tag }}
          generate_release_notes: true
          make_latest: true

  # ─── 3 ─────────────────────────────────────────────────────────────────────
  # Build Storybook + Docusaurus and deploy to GitHub Pages.
  # Waits for publish-npm so docs only deploy on a successful release.
  # ────────────────────────────────────────────────────────────────────────────
  deploy-site:
    name: Deploy docs + Storybook → ui.prokodo.com
    runs-on: ubuntu-latest
    needs: publish-npm
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 💿 Setup pnpm (v9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🧰 Setup Node.js (v22)
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build library
        run: pnpm build

      - name: 📘 Build Storybook (static export)
        run: pnpm run storybook:build

      - name: 📝 Generate docs component overview
        run: cd docs && node scripts/generate-overview.mjs

      - name: 📚 Build Docusaurus docs
        run: cd docs && pnpm build

      - name: 🧱 Assemble Pages site (docs root + storybook subpath)
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/storybook

          # Docs become the primary site at ui.prokodo.com
          cp -R docs/build/. site/

          # Storybook is served under /storybook
          cp -R storybook-static/. site/storybook/

          # Custom domain for GitHub Pages
          echo 'ui.prokodo.com' > site/CNAME

      - name: 🌐 Deploy to GitHub Pages (ui.prokodo.com)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          cname: ui.prokodo.com
