name: DCO Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Verifies that every commit in the PR contains a "Signed-off-by" trailer,
      # as required by CONTRIBUTING.md (DCO 1.1).
      # See https://developercertificate.org/
      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MISSING=()
          while IFS= read -r sha; do
            msg=$(git log -1 --format="%B" "$sha")
            if ! echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              MISSING+=("$sha")
            fi
          done < <(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ The following commits are missing a 'Signed-off-by' trailer:"
            for sha in "${MISSING[@]}"; do
              echo "   $sha  $(git log -1 --format='%s' "$sha")"
            done
            echo ""
            echo "Please amend your commits with:"
            echo "  git commit --amend --signoff"
            echo "or rebase with sign-off:"
            echo "  git rebase --signoff HEAD~${#MISSING[@]}"
            exit 1
          else
            echo "✅ All commits are signed off"
          fi
